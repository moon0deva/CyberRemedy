api:
  cors_origins:
  - '*'
  docs_enabled: true
  host: 0.0.0.0
  port: 8000
  websocket_broadcast_interval_ms: 1000
assets:
  db_path: data/assets/inventory.json
  enabled: true
  labels: {}
  port_scan_new_devices: true
  port_scan_ports:
  - 22
  - 80
  - 443
  - 3389
  - 445
  - 21
  - 23
  - 3306
  - 5432
  - 8080
  - 8443
  rogue_device_alert: true
  scan_interval_seconds: 300
  scan_on_startup: true
capture:
  flow_timeout_seconds: 60
  interface: auto
  live_enabled: true
  max_packets_buffer: 10000
  pcap_dir: data/pcap
  pcap_max_file_size_mb: 500
  pcap_max_total_gb: 20
  pcap_retention_days: 30
  pcap_save_enabled: false
  simulation_rate: 20
cases:
  auto_create_for:
  - CRITICAL
  - HIGH
  critical_sla_hours: 4
  db_path: data/cases.json
  default_sla_hours: 24
compliance:
  enabled: true
  frameworks:
  - pci_dss
  - hipaa
  - nist_800_53
  - cis_controls
data_lake:
  compression: true
  enabled: true
  format: jsonl
  max_size_gb: 50
  path: data/lake
  retention_days: 365
deployment:
  name: CyberRemedy Node
  profile: laptop
detection:
  anomaly:
    classifier_path: models/classifier_model.pkl
    contamination: 0.05
    model_path: models/anomaly_model.pkl
    retrain_on_startup: false
  correlation:
    chain_min_events: 2
    fp_reduction: true
    time_window_seconds: 300
  signature:
    brute_force_threshold: 10
    c2_beacon_interval_ms: 30000
    dns_entropy_threshold: 3.8
    port_scan_threshold: 15
  threshold: 70
firewall:
  backend: auto
  chain_name: CYBERREMEDY
  dry_run: false
  enabled: true
  webhook_api_key: ''
  webhook_enabled: false
  webhook_url: ''
  windows_rule_prefix: CYBERREMEDY-Block-
forensics:
  db_path: data/forensic_events.json
  enabled: true
  max_events: 100000
  retention_days: 365
geoip:
  block_high_risk: false
  enabled: true
  fallback: online
  high_risk_countries:
  - CN
  - RU
  - KP
  - IR
  - BY
  - CU
  - SY
honeypot:
  enabled: true
  listen_interface: 0.0.0.0
  services:
    ftp:
      enabled: true
      port: 2121
    http:
      enabled: true
      port: 8080
    mysql:
      enabled: true
      port: 3307
    smb:
      enabled: true
      port: 4445
    ssh:
      enabled: true
      port: 2222
    telnet:
      enabled: true
      port: 2323
logging:
  base_dir: data/logs
  compress_old: true
  max_total_gb: 50
  retention_days: 365
  rotate_daily: true
network:
  exclude_ips: []
  monitored_subnets: auto
  trusted_ips: []
notifications:
  daily_report_hour: 8
  email: '[object Object]'
  scheduled_reports: false
rbac:
  db_path: data/users.json
  default_admin:
    password: admin
    username: admin
  enabled: true
  jwt_expiry_hours: 24
  jwt_secret: CHANGE_ME_IN_PRODUCTION
  roles:
    admin:
      permissions:
      - '*'
    analyst:
      permissions:
      - read:alerts
      - write:cases
      - read:mitre
      - write:intel
      - read:ueba
      - write:response
    readonly:
      permissions:
      - read:alerts
      - read:cases
      - read:mitre
      - read:stats
reporting:
  blocked_ip_log: data/blocked_ips.json
  html_report_dir: data/reports
  json_log_path: data/logs.json
  max_log_entries: 10000
response:
  auto_block: false
  auto_block_critical: true
  auto_block_high: false
  auto_block_medium: false
  auto_block_threshold: 85
  blocked_ip_ttl_seconds: 3600
  dry_run: false
  notify_on_block: true
  rollback_enabled: true
scoring:
  critical_threshold: 80
  high_threshold: 60
  low_threshold: 0
  medium_threshold: 40
sigma:
  auto_load_community: false
  enabled: true
  rules_dir: data/sigma_rules
soar:
  db_path: data/playbooks.json
  enabled: true
syslog:
  agent_port: 5516
  enabled: true
  max_queue: 10000
  tcp_port: 5514
  udp_port: 5514
  winlog_port: 5515
system:
  interface: auto
  log_level: INFO
  offline_mode: true
  version: 1.0.0
threat_intel:
  db_path: data/ioc_db.json
  enabled: true
  feeds:
  - enabled: false
    name: abuse_ch_feodo
    type: ip
    url: https://feodotracker.abuse.ch/downloads/ipblocklist.txt
  - enabled: false
    name: abuse_ch_urlhaus
    type: url
    url: https://urlhaus.abuse.ch/downloads/csv_recent/
  misp_key: ''
  misp_url: ''
  otx_api_key: ''
  refresh_interval_hours: 6
  virustotal_api_key: ''
ueba:
  anomaly_threshold: 2.5
  db_path: data/ueba_profiles.json
  enabled: true
  learning_period_hours: 48
vuln:
  cve_db_path: data/cve_db.json
  cvss_minimum: 4.0
  enabled: true
  nvd_api_key: ''
yara:
  enabled: true
  rules_dir: data/yara_rules
  scan_payloads: true
